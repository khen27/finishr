<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#102033">
<title>Food GPS — Know what to eat next</title>
<style>
:root{
  --navy:#102033; --navy2:#183654; --green:#43E97B; --mint:#DDFCE8;
  --protein:#FF6B6B; --carb:#4D96FF; --fat:#FFD166; --cal:#FF9F1C;
  --bg:#F7F9FB; --card:#FFFFFF; --text:#17212B; --muted:#7A8694; --border:#E6EBF1;
  --shadow:0 6px 24px rgba(16,32,51,.08); --shadow-lg:0 14px 40px rgba(16,32,51,.14);
  --gA:#2FD07A; --gB:#8CD64B; --gC:#FFD166; --gD:#FF9F1C; --gE:#FF6B6B;
  --r:20px;
}
[data-theme="dark"]{
  --navy:#0c1a2c; --navy2:#12294a; --bg:#08111F; --card:#111C2E; --text:#F4F7FA; --muted:#9DAAB8; --border:#1c2b40;
  --mint:#12321f; --shadow:0 6px 24px rgba(0,0,0,.4); --shadow-lg:0 14px 40px rgba(0,0,0,.55);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Manrope,sans-serif;background:var(--bg);color:var(--text);transition:background .3s,color .3s}
h1,h2,h3,h4{margin:0;font-weight:800;letter-spacing:-.02em}
.muted{color:var(--muted)}
svg{display:block}
.ico{display:inline-flex;vertical-align:middle}

/* ---------- App shell ---------- */
#app{min-height:100vh;display:flex;flex-direction:column}
.sidebar{display:none}
.content{flex:1;width:100%;max-width:520px;margin:0 auto;padding:18px 16px 110px}
.screen{display:none;animation:fade .35s ease}
.screen.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* bottom nav (mobile) */
.nav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1.5px solid var(--border);display:flex;justify-content:space-around;padding:7px 0 calc(9px + env(safe-area-inset-bottom));z-index:60}
.nav button{background:none;border:none;font-family:inherit;color:var(--muted);font-size:10px;font-weight:700;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;flex:1;padding:2px}
.nav button.on{color:var(--green)}
.nav .navic{opacity:.9}

/* ---------- Desktop ---------- */
@media(min-width:900px){
  #app{flex-direction:row}
  .nav{display:none}
  .sidebar{display:flex;flex-direction:column;width:250px;flex:none;height:100vh;position:sticky;top:0;background:var(--card);border-right:1.5px solid var(--border);padding:22px 16px;gap:4px;z-index:60}
  .sidebar .sbrand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:20px;padding:6px 8px 18px}
  .sidebar button{display:flex;align-items:center;gap:12px;background:none;border:none;font-family:inherit;color:var(--muted);font-size:15px;font-weight:700;padding:12px 14px;border-radius:14px;cursor:pointer;text-align:left}
  .sidebar button:hover{background:var(--bg)}
  .sidebar button.on{background:var(--mint);color:var(--navy)}
  [data-theme="dark"] .sidebar button.on{color:var(--green)}
  .sidebar .spacer{flex:1}
  .content{max-width:1080px;padding:28px 34px 40px}
  .home-grid{display:grid;grid-template-columns:1.05fr .95fr;gap:22px;align-items:start}
  .radar-grid{display:grid;grid-template-columns:.9fr 1.1fr;gap:22px;align-items:start}
  .topbar{display:none}
}
@media(min-width:1280px){ .content{max-width:1180px} }

/* ---------- Buttons ---------- */
.btn{border:none;border-radius:15px;padding:14px 18px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;width:100%;transition:transform .1s,filter .15s;display:inline-flex;align-items:center;justify-content:center;gap:8px}
.btn:active{transform:scale(.98)}
.btn-primary{background:var(--green);color:var(--navy)}
.btn-primary:hover{filter:brightness(1.03)}
.btn-dark{background:var(--navy);color:#fff}
.btn-ghost{background:transparent;color:var(--muted);border:1.5px solid var(--border)}
.btn-sm{padding:10px 14px;font-size:13px;width:auto;border-radius:12px}
.chip{display:inline-flex;align-items:center;gap:6px;background:var(--card);border:1.5px solid var(--border);border-radius:999px;padding:8px 13px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap}
.chip.sel{border-color:var(--green);background:var(--mint);color:var(--navy)}
[data-theme="dark"] .chip.sel{color:var(--green)}
.card{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);padding:16px}
.link{color:var(--green);font-weight:700;font-size:13px;cursor:pointer;background:none;border:none;font-family:inherit;display:inline-flex;align-items:center;gap:4px}
.sec-title{display:flex;align-items:center;justify-content:space-between;margin:22px 2px 12px}
.sec-title h3{font-size:16px;display:flex;align-items:center;gap:8px}

/* topbar mobile */
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.brand{display:flex;align-items:center;gap:9px;font-weight:800;font-size:19px}
.iconbtn{width:40px;height:40px;border-radius:12px;border:1.5px solid var(--border);background:var(--card);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text);font-weight:800;font-size:13px}

/* ---------- Hero ---------- */
.hero{background:linear-gradient(140deg,var(--navy),var(--navy2));color:#fff;border-radius:26px;padding:22px;box-shadow:var(--shadow-lg);position:relative;overflow:hidden}
.hero .glow{position:absolute;width:220px;height:220px;border-radius:50%;background:radial-gradient(circle,rgba(67,233,123,.35),transparent 70%);top:-90px;right:-60px}
.hero .htop{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;opacity:.85;position:relative}
.hero .big{font-size:54px;font-weight:800;line-height:1;margin:8px 0 2px;letter-spacing:-.03em;position:relative}
.hero .big.over{color:var(--fat)}
.hero .sub{opacity:.72;font-size:13px;font-weight:600;position:relative}
.calbar{height:8px;background:rgba(255,255,255,.15);border-radius:99px;margin-top:16px;overflow:hidden;position:relative}
.calbar>div{height:100%;background:linear-gradient(90deg,var(--cal),var(--green));border-radius:99px;transition:width .6s}
.routebadge{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:800;padding:6px 12px;border-radius:99px;margin-top:14px;position:relative}

/* ---------- Macro rings ---------- */
.macros{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:16px 0}
.macro{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);padding:14px 6px;text-align:center}
.ring{width:80px;height:80px;margin:0 auto 8px;position:relative}
.ring svg{transform:rotate(-90deg)}
.ring .val{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring .num{font-size:21px;font-weight:800;line-height:1}
.ring .unit{font-size:10px;color:var(--muted);font-weight:700}
.macro .lbl{font-size:13px;font-weight:800;display:flex;align-items:center;justify-content:center;gap:5px}
.macro .left{font-size:11px;color:var(--muted);font-weight:700;margin-top:2px}

/* ---------- Grade badge ---------- */
.grade{width:30px;height:30px;border-radius:10px;display:inline-flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;color:#fff;flex:none}
.grade.sm{width:24px;height:24px;font-size:12px;border-radius:8px}
.g-A{background:var(--gA)}.g-B{background:var(--gB)}.g-C{background:var(--gC);color:#5a4a00}.g-D{background:var(--gD)}.g-E{background:var(--gE)}

/* ---------- Widget (collapsible) ---------- */
.widget{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden;margin-bottom:12px}
.widget-head{display:flex;align-items:center;gap:12px;padding:15px 16px;cursor:pointer;user-select:none}
.widget-head .whic{width:40px;height:40px;border-radius:12px;background:var(--mint);display:flex;align-items:center;justify-content:center;flex:none;color:var(--navy)}
[data-theme="dark"] .widget-head .whic{color:var(--green)}
.widget-head .wtitle{flex:1;min-width:0}
.widget-head .wtitle b{font-size:15px;display:block}
.widget-head .wtitle span{font-size:12px;color:var(--muted);font-weight:600}
.chev{transition:transform .25s;color:var(--muted);flex:none}
.widget.open .chev{transform:rotate(180deg)}
.widget-body{max-height:0;overflow:hidden;transition:max-height .3s ease;padding:0 16px}
.widget.open .widget-body{max-height:1400px;padding:0 16px 16px}
.wsummary{display:flex;gap:8px;margin:2px 16px 0}
.minibar{flex:1;height:6px;border-radius:99px;background:var(--border);overflow:hidden}
.minibar>div{height:100%;border-radius:99px}

/* log rows */
.row{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--border)}
.row:last-child{border-bottom:none}
.ftile{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex:none}
.row .info{flex:1;min-width:0}
.row .nm{font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row .mm{font-size:11px;color:var(--muted);font-weight:600;margin-top:1px}
.row .kc{font-weight:800;font-size:14px}
.row .del{color:var(--muted);cursor:pointer;padding:4px;display:flex}
.empty{text-align:center;color:var(--muted);padding:24px 10px;font-size:14px}
.empty .em-ic{display:flex;justify-content:center;margin-bottom:10px;opacity:.5}

/* insight card */
.insight{display:flex;gap:12px;align-items:flex-start;background:linear-gradient(135deg,var(--mint),var(--card));border:1.5px solid var(--green);border-radius:var(--r);padding:14px 15px;margin-bottom:14px}
[data-theme="dark"] .insight{background:linear-gradient(135deg,#123021,var(--card))}
.insight .ib{width:38px;height:38px;border-radius:11px;background:var(--green);color:var(--navy);display:flex;align-items:center;justify-content:center;flex:none}
.insight .it b{font-size:14px;display:block;margin-bottom:2px}
.insight .it p{margin:0;font-size:13px;color:var(--muted);font-weight:600;line-height:1.35}
.insight .it .icta{margin-top:8px}

/* rec cards */
.reccat h4{font-size:13px;margin:16px 0 8px;display:flex;align-items:center;gap:7px}
.dot{width:9px;height:9px;border-radius:50%}
.reccard{display:flex;align-items:center;gap:12px;background:var(--card);border-radius:15px;padding:11px 13px;margin-bottom:8px;box-shadow:var(--shadow);cursor:pointer;border:1.5px solid transparent;transition:border-color .12s}
.reccard:hover{border-color:var(--green)}
.reccard .info{flex:1;min-width:0}
.reccard .nm{font-weight:700;font-size:14px}
.reccard .why{font-size:11px;color:var(--muted);font-weight:600;margin-top:2px;display:flex;flex-wrap:wrap;gap:2px 8px}
.reccard .pill{display:inline-flex;align-items:center;gap:3px}

/* locked */
.locked{background:linear-gradient(135deg,var(--navy),var(--navy2));color:#fff;border-radius:var(--r);padding:16px;text-align:center;box-shadow:var(--shadow)}
.locked .lk{display:flex;justify-content:center;margin-bottom:6px;color:var(--fat)}
.locked h4{margin:2px 0 4px;font-size:15px}
.locked p{margin:0 0 12px;font-size:13px;opacity:.75}

/* delivery badge */
.dbadge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:800;padding:3px 8px;border-radius:8px}
.d-wolt{background:#00c2e8;color:#022}
.d-foodora{background:#d70f64;color:#fff}
.d-partner{background:var(--fat);color:#5a4a00}

/* nearby / places */
.place{display:flex;align-items:center;gap:12px;background:var(--card);border-radius:15px;padding:12px 13px;margin-bottom:9px;box-shadow:var(--shadow);cursor:pointer;border:1.5px solid transparent}
.place:hover{border-color:var(--green)}
.place .ptile{width:44px;height:44px;border-radius:13px;display:flex;align-items:center;justify-content:center;flex:none;background:var(--mint);color:var(--navy)}
[data-theme="dark"] .place .ptile{color:var(--green)}
.place .info{flex:1;min-width:0}
.place .nm{font-weight:800;font-size:14px;display:flex;align-items:center;gap:6px}
.place .meta{font-size:11px;color:var(--muted);font-weight:600;margin-top:2px;display:flex;flex-wrap:wrap;gap:2px 8px;align-items:center}

/* radar */
.radarwrap{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);padding:14px;position:relative}
.radarwrap svg{width:100%;height:auto;display:block;overflow:visible}
.rdot{cursor:pointer}
.rdot circle{transition:r .15s}
.rdot:hover circle.hit{r:9}
.rlegend{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-top:10px;font-size:11px;font-weight:700;color:var(--muted)}
.rlegend span{display:flex;align-items:center;gap:5px}

/* crave */
.craveopt{display:flex;flex-direction:column;align-items:center;gap:8px;background:var(--card);border:1.5px solid var(--border);border-radius:16px;padding:16px 8px;cursor:pointer;transition:.12s}
.craveopt:hover{border-color:var(--green);transform:translateY(-2px)}
.craveopt .cvic{width:46px;height:46px;border-radius:14px;display:flex;align-items:center;justify-content:center}
.craveopt b{font-size:13px;font-weight:800}
.cravegrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
@media(min-width:600px){.cravegrid{grid-template-columns:repeat(4,1fr)}}
.altcard{background:var(--card);border-radius:15px;box-shadow:var(--shadow);padding:13px;margin-bottom:10px;border:1.5px solid transparent}
.altcard .ahead{display:flex;align-items:center;gap:11px}
.altcard .why{font-size:12px;color:var(--muted);font-weight:600;margin-top:8px;line-height:1.4}

/* meal builder tray */
.tray{position:sticky;bottom:0;background:var(--card);border-top:1.5px solid var(--border);margin:0 -18px -28px;padding:12px 18px 20px;box-shadow:0 -6px 20px rgba(16,32,51,.08)}
.traytop{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.traychips{display:flex;gap:6px;overflow-x:auto;padding-bottom:6px}
.traychip{display:inline-flex;align-items:center;gap:5px;background:var(--mint);color:var(--navy);border-radius:99px;padding:5px 10px;font-size:12px;font-weight:700;white-space:nowrap}
[data-theme="dark"] .traychip{color:var(--green)}
.traychip .x{cursor:pointer;display:flex}

/* overlay/sheet */
.overlay{position:fixed;inset:0;background:rgba(8,17,31,.55);backdrop-filter:blur(3px);display:none;align-items:flex-end;justify-content:center;z-index:100}
.overlay.show{display:flex}
@media(min-width:900px){.overlay{align-items:center}}
.sheet{background:var(--bg);width:100%;max-width:480px;border-radius:26px 26px 0 0;max-height:92vh;overflow-y:auto;padding:14px 18px 28px;animation:up .3s ease}
@media(min-width:900px){.sheet{border-radius:24px;max-height:88vh;box-shadow:var(--shadow-lg)}}
@keyframes up{from{transform:translateY(40px);opacity:.5}to{transform:none;opacity:1}}
.grab{width:44px;height:5px;background:var(--border);border-radius:99px;margin:0 auto 12px}
.sheet h3{font-size:19px;margin-bottom:4px}
.search{width:100%;border:1.5px solid var(--border);border-radius:14px;padding:13px 16px 13px 42px;font-size:16px;font-family:inherit;background:var(--card);color:var(--text);margin-bottom:12px}
.searchwrap{position:relative}
.searchwrap .sic{position:absolute;left:14px;top:13px;color:var(--muted)}
.search:focus{outline:none;border-color:var(--green)}
.tabs{display:flex;gap:7px;margin-bottom:10px;overflow-x:auto;padding-bottom:3px}
.tabs .chip{flex:none}
.foodrow{display:flex;align-items:center;gap:11px;padding:10px 4px;border-bottom:1px solid var(--border);cursor:pointer}
.foodrow .info{flex:1;min-width:0}
.foodrow .nm{font-weight:700;font-size:14px}
.foodrow .mm{font-size:11px;color:var(--muted);font-weight:600}
.foodrow .add{width:30px;height:30px;border-radius:10px;border:1.5px solid var(--green);color:var(--green);background:none;display:flex;align-items:center;justify-content:center;cursor:pointer;flex:none}
.foodrow .add.in{background:var(--green);color:var(--navy)}

/* amount */
.amtwrap{text-align:center;padding:6px 0}
.amtwrap .abig{width:60px;height:60px;border-radius:18px;margin:0 auto 8px;display:flex;align-items:center;justify-content:center}
.amtctrl{display:flex;align-items:center;justify-content:center;gap:12px;margin:16px 0}
.amtctrl button{width:46px;height:46px;border-radius:14px;border:1.5px solid var(--border);background:var(--card);color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center}
.amtctrl input{width:96px;text-align:center;font-size:30px;font-weight:800;border:none;background:transparent;color:var(--text);font-family:inherit}
.amtmac{display:flex;justify-content:center;gap:14px;margin:14px 0;font-size:13px;font-weight:800}
.amtmac span{display:flex;flex-direction:column;align-items:center;gap:2px}
.amtmac small{color:var(--muted);font-size:10px;font-weight:700}
.mealsel{display:flex;gap:7px;justify-content:center;margin:8px 0 14px;flex-wrap:wrap}
.ratebox{background:var(--card);border-radius:14px;padding:12px;margin:10px 0;display:flex;align-items:center;gap:12px;text-align:left}

/* onboarding */
.ob{max-width:460px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding:26px 18px}
.ob .step{font-size:12px;font-weight:800;color:var(--green);letter-spacing:.1em;text-transform:uppercase}
.ob h2{font-size:26px;margin:8px 0 18px;line-height:1.15}
.dots{display:flex;gap:6px;justify-content:center;margin:20px 0}
.dots i{width:7px;height:7px;border-radius:99px;background:var(--border)}
.dots i.on{background:var(--green);width:20px}
.field{margin-bottom:13px}
.field label{font-size:13px;font-weight:700;color:var(--muted);display:block;margin-bottom:6px}
.field input,.field select{width:100%;border:1.5px solid var(--border);border-radius:14px;padding:13px 15px;font-size:17px;font-family:inherit;background:var(--card);color:var(--text);font-weight:700}
.field input:focus,.field select:focus{outline:none;border-color:var(--green)}
.optcol{display:flex;flex-direction:column;gap:10px}
.opt{border:1.5px solid var(--border);border-radius:15px;padding:15px;background:var(--card);cursor:pointer;font-weight:700;font-size:15px;display:flex;align-items:center;gap:12px}
.opt.sel{border-color:var(--green);background:var(--mint);color:var(--navy)}
[data-theme="dark"] .opt.sel{color:var(--green)}
.opt .oic{color:var(--green)}
.chipwrap{display:flex;flex-wrap:wrap;gap:8px}
.center{text-align:center}

/* settings */
.settingrow{display:flex;align-items:center;justify-content:space-between;padding:14px 2px;border-bottom:1px solid var(--border)}
.settingrow:last-child{border-bottom:none}
.settingrow .lab{font-weight:700;font-size:15px}
.settingrow .sub{font-size:12px;color:var(--muted);font-weight:600}
.toggle{width:48px;height:28px;border-radius:99px;background:var(--border);position:relative;cursor:pointer;transition:.2s;flex:none}
.toggle.on{background:var(--green)}
.toggle::after{content:"";position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;background:#fff;transition:.2s}
.toggle.on::after{left:23px}
.seg{display:flex;background:var(--card);border:1.5px solid var(--border);border-radius:14px;overflow:hidden}
.seg button{flex:1;border:none;background:none;padding:10px;font-family:inherit;font-weight:700;font-size:13px;color:var(--muted);cursor:pointer}
.seg button.on{background:var(--green);color:var(--navy)}
.badgegrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
@media(min-width:600px){.badgegrid{grid-template-columns:repeat(6,1fr)}}
.badge{background:var(--card);border-radius:15px;padding:13px 6px;text-align:center;box-shadow:var(--shadow)}
.badge.lockedb{opacity:.4;filter:grayscale(1)}
.badge .bn{font-size:11px;font-weight:700;margin-top:6px}
.pricegrid{display:flex;flex-direction:column;gap:10px;margin:12px 0}
.price{border:1.5px solid var(--border);border-radius:16px;padding:15px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;background:var(--card)}
.price.best{border-color:var(--green);background:var(--mint);color:var(--navy)}
[data-theme="dark"] .price.best{color:var(--green)}
.price .pt{font-weight:800;font-size:15px}
.price .pp{font-weight:800;font-size:16px}
.price .ps{font-size:11px;color:var(--muted);font-weight:600}
.feat{display:flex;align-items:flex-start;gap:10px;margin:9px 0;font-size:14px;font-weight:600}
.feat .ck{color:var(--green);flex:none;margin-top:1px}
.sharecard{background:linear-gradient(140deg,var(--navy),#1d4468);color:#fff;border-radius:22px;padding:22px;position:relative;overflow:hidden}
.sharecard .sbrand{display:flex;align-items:center;gap:8px;font-weight:800;font-size:15px;opacity:.95}
.sharecard .sbig{font-size:14px;font-weight:600;opacity:.8;margin-top:16px}
.sharecard .srow{display:flex;justify-content:space-between;margin-top:12px;gap:8px}
.sharecard .sm{flex:1;text-align:center;background:rgba(255,255,255,.08);border-radius:13px;padding:11px 4px}
.sharecard .sm .n{font-size:19px;font-weight:800}
.sharecard .sm .l{font-size:10px;opacity:.7;font-weight:600;margin-top:2px}
.sharecard .snext{margin-top:14px;background:rgba(67,233,123,.16);border-radius:13px;padding:11px;font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px}

.toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--navy);color:#fff;padding:12px 18px;border-radius:14px;font-size:14px;font-weight:700;opacity:0;transition:.3s;z-index:200;pointer-events:none;box-shadow:var(--shadow-lg);max-width:88%;display:flex;align-items:center;gap:8px}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
[data-theme="dark"] .toast{background:var(--green);color:var(--navy)}
</style>

<body>
<div id="app">
  <!-- SIDEBAR (desktop) -->
  <aside class="sidebar" id="sidebar"></aside>

  <div class="content" id="content">
    <!-- ONBOARDING -->
    <section id="scr-onboard" class="screen active">
      <div class="ob">
        <div id="obBody"></div>
        <div class="dots" id="obDots"></div>
        <button class="btn btn-primary" id="obNext">Continue</button>
        <button class="btn btn-ghost" id="obBack" style="margin-top:8px;display:none">Back</button>
      </div>
    </section>

    <!-- HOME -->
    <section id="scr-home" class="screen">
      <div class="topbar">
        <div class="brand"><span id="brandPin"></span><span>Food GPS</span></div>
        <div style="display:flex;gap:8px">
          <button class="iconbtn" id="langBtn">EN</button>
          <button class="iconbtn" id="themeBtn"></button>
        </div>
      </div>
      <div class="home-grid">
        <div class="colA">
          <div class="hero"><div class="glow"></div>
            <div class="htop" id="heroTop"></div>
            <div class="big" id="calLeft">0</div>
            <div class="sub"><span id="calLeftLbl">kcal left</span> · <span data-i="target">Daily target</span> <span id="calTarget">0</span></div>
            <div class="calbar"><div id="calBar" style="width:0%"></div></div>
            <div class="routebadge" id="routeBadge"></div>
          </div>
          <div class="macros" id="macroCircles"></div>
          <button class="btn btn-primary" id="addFoodBtn" style="margin-bottom:12px"></button>
          <div id="todayWidget"></div>
        </div>
        <div class="colB">
          <div id="insightHome"></div>
          <div id="suggestBar"></div>
          <div id="recSection"></div>
          <div id="nearbyPreview"></div>
        </div>
      </div>
    </section>

    <!-- RADAR -->
    <section id="scr-radar" class="screen">
      <div class="topbar"><div class="brand" data-i="radar">Radar</div><button class="iconbtn" id="radarFilterBtn" style="width:auto;padding:0 12px;gap:6px"></button></div>
      <div class="radar-grid">
        <div>
          <div class="radarwrap"><div id="radarSvg"></div>
            <div class="rlegend" id="radarLegend"></div>
          </div>
          <div id="radarInsight" style="margin-top:12px"></div>
        </div>
        <div>
          <div class="sec-title"><h3 id="nearbyTitle">Nearby, ranked for your macros</h3></div>
          <div id="placeList"></div>
        </div>
      </div>
    </section>

    <!-- CRAVE -->
    <section id="scr-crave" class="screen">
      <div class="topbar"><div class="brand" data-i="crave">Crave Mode</div></div>
      <div id="craveHeader"></div>
      <div id="craveBody"></div>
    </section>

    <!-- HISTORY -->
    <section id="scr-history" class="screen">
      <div class="topbar"><div class="brand" data-i="history">History</div></div>
      <div id="historyContent"></div>
    </section>

    <!-- PROFILE -->
    <section id="scr-profile" class="screen">
      <div class="topbar"><div class="brand" data-i="profile">Profile</div></div>
      <div id="profileContent"></div>
    </section>
  </div>

  <!-- BOTTOM NAV (mobile) -->
  <nav class="nav" id="nav"></nav>
</div>

<!-- FOOD SHEET -->
<div class="overlay" id="foodOverlay"><div class="sheet" id="foodSheet">
  <div class="grab"></div>
  <h3 data-i="buildmeal">Add food &amp; build a meal</h3>
  <p class="muted" style="font-size:12px;font-weight:600;margin:0 0 12px" data-i="buildsub">Add one item or stack several into a meal.</p>
  <div class="searchwrap"><span class="sic" id="searchIc"></span><input class="search" id="foodSearch" placeholder="chicken · rice 150g · skyr…" autocomplete="off"></div>
  <div class="tabs" id="foodTabs"></div>
  <div id="foodResults"></div>
  <div id="mealTray"></div>
</div></div>

<div class="overlay" id="amtOverlay"><div class="sheet" id="amtSheet"><div class="grab"></div><div id="amtBody"></div></div></div>

/* =========================================================================
   Totals / remaining / scoring / grading
   ========================================================================= */
function totalsFor(e){return e.reduce((a,x)=>({kcal:a.kcal+x.kcal,p:a.p+x.p,c:a.c+x.c,f:a.f+x.f}),{kcal:0,p:0,c:0,f:0});}
function remaining(){const tot=totalsFor(todayLog());return{kcal:S.targets.calories-tot.kcal,p:S.targets.protein-tot.p,c:S.targets.carbs-tot.c,f:S.targets.fat-tot.f,tot};}
function servingMacros(f,g){const r=g/100;return{kcal:f.kcal*r,p:f.p*r,c:f.c*r,f:f.f*r};}
/* Score a macro payload {kcal,p,c,f} for "how good a choice is this right now".
   Uses macro-ALIGNMENT (cosine of the food's macro-calorie mix vs. what you still
   need) so it grades sensibly at any point in the day, plus a protein-priority
   reward and an overshoot penalty that bites when little room is left. */
function scorePayload(m,extra){
 const rem=remaining(),tgt=S.targets;extra=extra||{};
 const needP=Math.max(0,rem.p),needC=Math.max(0,rem.c),needF=Math.max(0,rem.f),needK=Math.max(0,rem.kcal);
 let nP=needP*4,nC=needC*4,nF=needF*9;
 if(nP+nC+nF<10){nP=tgt.protein*4;nC=tgt.carbs*4;nF=tgt.fat*9;} // all filled -> use target ratios
 const fP=m.p*4,fC=m.c*4,fF=m.f*9;
 const dot=nP*fP+nC*fC+nF*fF;
 const magN=Math.hypot(nP,nC,nF),magF=Math.hypot(fP,fC,fF)||1;
 const align=dot/((magN*magF)||1); // 0..1 : macro-mix match
 // reward ACTUAL protein grams delivered toward the gap (not just density)
 const protBonus=needP>3?Math.min(m.p,needP)/(tgt.protein||1)*0.45:0;
 // substance: when lots of room remains, nudge toward meals that actually feed you
 const sub=needK>tgt.calories*0.4?Math.min(1,m.kcal/260)*0.12:0;
 let over=0;
 if(m.f>needF+3)over+=(m.f-needF)/(tgt.fat||1)*0.55;
 if(needK<tgt.calories*0.55&&m.kcal>needK+50)over+=(m.kcal-needK)/(tgt.calories||1)*1.0;
 if(rem.kcal<0)over+=0.25;
 const raw=align*0.72+protBonus+sub+(extra.pref||0)+(extra.junk||0)-over;
 return raw;
}
function scoreFood(f){const g=f.srv,m=servingMacros(f,g);
 const junk=["pizza","burger","fries","chips","donut","icecream","croissant","chocmilk","granolabar"].includes(f.id)?-0.10:0.03;
 let pref=S.favorites.includes(f.id)?0.12:0;
 if(has("highprotein")&&f.pm==="P")pref+=0.06;
 if(has("budget")&&f.price===1)pref+=0.04;
 const raw=scorePayload(m,{pref,junk});
 return{food:f,g,m,raw};}
function matchPct(raw){return Math.max(5,Math.min(99,Math.round(raw*105+8)));}
function grade(pct){return pct>=80?"A":pct>=64?"B":pct>=48?"C":pct>=32?"D":"E";}
function gradeBadge(pct,sm){const g=grade(pct);return `<span class="grade g-${g}${sm?' sm':''}">${g}</span>`;}
function stars(pct){return Math.max(1,Math.min(5,Math.round(pct/20)));}
function dietOk(f){if(has("vegan")&&(!f.veg||["dairy","cheese","egg"].includes(f.cat)))return false;if(has("vegetarian")&&!f.veg)return false;if(has("lowcarb")&&f.c>40)return false;return true;}
function whyLines(m){const rem=remaining(),out=[];
 if(m.p>=8&&rem.p>5)out.push(["dumbbell",L("Adds protein","Dodá bílkoviny")]);
 if(m.c>2&&m.c<=Math.max(0,rem.c)+6)out.push(["f_grain",L("Fits carbs","Sedí sacharidy")]);
 if(m.f<=Math.max(0,rem.f))out.push(["check",L("Keeps fat low","Drží tuk nízko")]);
 if(m.f>Math.max(0,rem.f)+3)out.push(["flame",L("High fat today","Hodně tuku dnes")]);
 if(m.kcal>Math.max(0,rem.kcal)+40)out.push(["flame",L("Over calories","Přes kalorie")]);
 if(!out.length)out.push(["check",L("Balanced pick","Vyvážená volba")]);
 return out.slice(0,3).map(x=>`<span class="pill">${ic(x[0],{size:12})}${x[1]}</span>`).join("");}
function ratingText(pct){if(LANG==="cs")return pct>=80?"Skvěle sedí dnes.":pct>=60?"Dobrá volba na teď.":pct>=40?"Ok, hlídej zbytek dne.":"Dnes se těžko vejde.";
 return pct>=80?"Great fit today.":pct>=60?"Solid choice right now.":pct>=40?"Okay fit — mind the rest of today.":"Hard to fit today.";}

 if(has("sweettooth"))out.push({ic:"crave",title:L("Craving something sweet?","Chuť na sladké?"),text:L("Crave Mode maps candy, chocolate and ice cream to swaps that actually fit your macros today.","Chuťový režim namapuje sladkosti na varianty, které dnes sednou do tvých maker."),cta:{label:L("Open Crave Mode","Otevřít Chuťový režim"),act:()=>go("crave")}});
 if(!out.length)out.push({ic:"compass",title:L("You're on route","Jsi na trase"),text:L("Macros are balanced. When you're ready to eat, hit ‘What to eat next’ for the best-fitting options.","Makra jsou vyvážená. Až budeš chtít jíst, mrkni na ‚Co si dát dál‘.")});

}

const CATS=[["meat",L("Meat","Maso")],["fish",L("Fish","Ryby")],["egg",L("Eggs","Vejce")],["dairy",L("Dairy","Mléčné")],["bean",L("Legumes","Luštěniny")],["grain",L("Grains","Obiloviny")],["bread",L("Bread","Pečivo")],["veg",L("Veg","Zelenina")],["fruit",L("Fruit","Ovoce")],["nut",L("Nuts","Ořechy")],["cheese",L("Cheese","Sýry")],["sweet",L("Sweets","Sladké")],["fast",L("Fast food","Fast food")]];
function openFood(){curTab="all";curCat="all";mealTray=[];$("#foodSearch").value="";$("#searchIc").innerHTML=ic("search",{size:18,color:"var(--muted)"});renderTabs();renderFoodList();renderTray();openSheet("food");setTimeout(()=>$("#foodSearch").focus(),250);}
function renderTabs(){$("#foodTabs").innerHTML=FOOD_TABS().map(t=>`<button class="chip ${t[0]===curTab?'sel':''}" data-tab="${t[0]}">${t[1]}</button>`).join("");
 $$("#foodTabs .chip").forEach(c=>c.onclick=()=>{curTab=c.dataset.tab;renderTabs();renderFoodList();});}
function toggleFav(id){if(S.favorites.includes(id))S.favorites=S.favorites.filter(x=>x!==id);
 else{if(!S.premium&&S.favorites.length>=10){openSheet("amt",`<div class="amtwrap"><div class="abig" style="background:var(--mint);color:var(--navy)">${ic("star",{size:26})}</div><h3>${L("You've saved 10 favorites","Máš 10 oblíbených")}</h3><p class="muted" style="font-weight:600">${L("Upgrade to save unlimited meals and foods.","Upgraduj pro neomezené ukládání.")}</p><button class="btn btn-primary" style="margin-top:12px" onclick="closeSheets();go('profile')">${L("Start Premium","Aktivovat Premium")}</button></div>`);return;}S.favorites.push(id);}save();renderFoodList();}
function inTray(id){return mealTray.some(x=>x.f.id===id);}
function renderFoodList(){
 const q=$("#foodSearch").value.trim().toLowerCase();const mA=q.match(/(\d+)\s*g?$/);const qN=q.replace(/(\d+)\s*g?$/,"").trim();const amtHint=mA?+mA[1]:null;
 let list;
 if(curTab==="custom"){renderCustom();return;}
 if(curTab==="fav")list=FOODS.filter(f=>S.favorites.includes(f.id));
 else if(curTab==="recent")list=S.recent.map(id=>FMAP[id]).filter(Boolean);
 else if(curTab==="best")list=FOODS.filter(dietOk).map(scoreFood).sort((a,b)=>b.raw-a.raw).map(s=>s.food);
 else list=FOODS.slice();
 // category filter row for "type"
 let catRow="";
 if(curTab==="type"){catRow=`<div class="tabs" style="margin-bottom:8px">${[["all",L("All","Vše")]].concat(CATS).map(c=>`<button class="chip ${c[0]===curCat?'sel':''}" data-cat="${c[0]}">${c[1]}</button>`).join("")}</div>`;
   if(curCat!=="all")list=list.filter(f=>f.cat===curCat);}
 if(qN)list=list.filter(f=>f.en.toLowerCase().includes(qN)||f.cs.toLowerCase().includes(qN));
 const el=$("#foodResults");
 const rows=list.slice(0,50).map(f=>{const sc=scoreFood(f),pct=matchPct(sc.raw);
   return `<div class="foodrow" data-food="${f.id}" data-amt="${amtHint||''}">${foodTile(f,38)}
     <div class="info"><div class="nm">${fname(f)}</div><div class="mm">${f.kcal} kcal · P${f.p} C${f.c} F${f.f} /100g</div></div>
     ${gradeBadge(pct,true)}
     <button class="add ${inTray(f.id)?'in':''}" data-tray="${f.id}">${ic(inTray(f.id)?"check":"plus",{size:16})}</button></div>`;}).join("");
 el.innerHTML=catRow+(rows||`<div class="empty">${L("No matches","Nic nenalezeno")}</div>`);
 if(curTab==="type")$$("#foodResults [data-cat]").forEach(c=>c.onclick=()=>{curCat=c.dataset.cat;renderFoodList();});
 $$("#foodResults .foodrow").forEach(r=>r.onclick=e=>{if(e.target.closest("[data-tray]"))return;const f=FMAP[r.dataset.food];const g=r.dataset.amt?+r.dataset.amt:f.srv;curFood=f;curAmt=g;curMeal=guessMeal();drawAmount();openSheet("amt");});
 $$("#foodResults [data-tray]").forEach(b=>b.onclick=e=>{e.stopPropagation();const id=b.dataset.tray;const f=FMAP[id];if(inTray(id))mealTray=mealTray.filter(x=>x.f.id!==id);else mealTray.push({f,g:f.srv});renderFoodList();renderTray();});
}
function renderCustom(){$("#foodResults").innerHTML=`<div style="padding:4px 2px">
   <div class="field"><label>${L("Food name","Název jídla")}</label><input id="cName" placeholder="${L("Homemade soup","Domácí polévka")}"></div>
   <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
     <div class="field"><label>kcal / 100g</label><input id="cK" type="number" inputmode="numeric"></div>
     <div class="field"><label>P / 100g</label><input id="cP" type="number" inputmode="numeric"></div>
     <div class="field"><label>C / 100g</label><input id="cC" type="number" inputmode="numeric"></div>
     <div class="field"><label>F / 100g</label><input id="cF" type="number" inputmode="numeric"></div></div>
   <button class="btn btn-primary" id="cSave">${L("Save & add","Uložit a přidat")}</button></div>`;
 $("#cSave").onclick=()=>{const f={id:"custom_"+Date.now(),custom:true,en:$("#cName").value||"Custom food",cs:$("#cName").value||"Vlastní jídlo",cat:"fork",kcal:+$("#cK").value||0,p:+$("#cP").value||0,c:+$("#cC").value||0,f:+$("#cF").value||0,pm:"P",srv:100};curFood=f;curAmt=100;curMeal=guessMeal();drawAmount();openSheet("amt");};}
function renderTray(){
 const el=$("#mealTray");if(!mealTray.length){el.innerHTML="";return;}
 const tot=mealTray.reduce((a,x)=>{const m=servingMacros(x.f,x.g);return{kcal:a.kcal+m.kcal,p:a.p+m.p,c:a.c+m.c,f:a.f+m.f};},{kcal:0,p:0,c:0,f:0});
 const pct=matchPct(scorePayload(tot));
 el.innerHTML=`<div class="tray"><div class="traytop"><div style="display:flex;align-items:center;gap:8px">${gradeBadge(pct,true)}<b style="font-size:14px">${L("Meal","Meal")} · ${Math.round(tot.kcal)} kcal</b></div>
   <div class="muted" style="font-size:11px;font-weight:700">P${Math.round(tot.p)} C${Math.round(tot.c)} F${Math.round(tot.f)} · ${pct}%</div></div>
   <div class="traychips">${mealTray.map(x=>`<span class="traychip">${fname(x.f)} ${x.g}g<span class="x" data-rm="${x.f.id}">${ic("close",{size:12})}</span></span>`).join("")}</div>
   <button class="btn btn-primary" id="logMeal" style="margin-top:8px">${ic("plus",{size:16})}${L("Log meal","Zapsat meal")} (${mealTray.length})</button></div>`;
 $$("#mealTray [data-rm]").forEach(b=>b.onclick=()=>{mealTray=mealTray.filter(x=>x.f.id!==b.dataset.rm);renderFoodList();renderTray();});
 $("#logMeal").onclick=()=>{const meal=guessMeal();mealTray.forEach(x=>logFood(x.f,x.g,meal,true));mealTray=[];closeSheets();renderHome();toast(L("Meal logged","Meal zapsán"),"check");};
}

let radarFilter="all";
function renderRadar(){
 $("#radarFilterBtn").innerHTML=ic("filter",{size:16})+L("Filter","Filtr");
 $("#nearbyTitle").textContent=L("Nearby, ranked for your macros","Poblíž, seřazeno podle mak. cílů");
 let places=PLACES.slice();
 if(radarFilter==="delivery")places=places.filter(p=>p.partner);
 else if(radarFilter==="grocery")places=places.filter(p=>p.type==="grocery");
 else if(radarFilter==="fit")places=places.filter(p=>bestItemOfPlace(p).pct>=70);
 const ranked=places.map(pl=>({pl,best:bestItemOfPlace(pl)})).sort((a,b)=>b.best.pct-a.best.pct);
 // radar svg
 const cx=160,cy=160,maxD=1000;const rings=[250,500,750,1000];
 let dots="";
 ranked.forEach(r=>{const rad=Math.min(1,r.pl.dist/maxD)*140+14;const a=r.pl.ang*Math.PI/180;const x=cx+rad*Math.cos(a),y=cy+rad*Math.sin(a);
   const g=grade(r.best.pct);const col=`var(--g${g})`;const locked=r.pl.premium&&!S.premium;
   dots+=`<g class="rdot" data-place="${r.pl.id}"><circle class="hit" cx="${x}" cy="${y}" r="7" fill="${col}" stroke="var(--card)" stroke-width="2"/>
     <text x="${x}" y="${y+3.5}" text-anchor="middle" font-size="8" font-weight="800" fill="#08111f">${locked?'★':g}</text></g>`;});
 $("#radarSvg").innerHTML=`<svg viewBox="0 0 320 320">
   ${rings.map(rr=>{const rad=Math.min(1,rr/maxD)*140+14;return `<circle cx="${cx}" cy="${cy}" r="${rad}" fill="none" stroke="var(--border)" stroke-width="1"/><text x="${cx+rad-2}" y="${cy-4}" font-size="8" fill="var(--muted)" text-anchor="end">${rr}m</text>`;}).join("")}
   <line x1="${cx}" y1="20" x2="${cx}" y2="300" stroke="var(--border)" stroke-width="1"/><line x1="20" y1="${cy}" x2="300" y2="${cy}" stroke="var(--border)" stroke-width="1"/>
   ${dots}
   <circle cx="${cx}" cy="${cy}" r="9" fill="var(--green)"/><circle cx="${cx}" cy="${cy}" r="16" fill="none" stroke="var(--green)" stroke-width="1.5" opacity=".5"><animate attributeName="r" from="9" to="150" dur="3s" repeatCount="indefinite"/><animate attributeName="opacity" from=".5" to="0" dur="3s" repeatCount="indefinite"/></circle>
   <text x="${cx}" y="${cy+3}" text-anchor="middle" font-size="9" font-weight="800" fill="#08111f">${L("YOU","TY")}</text>
 </svg>`;
 $("#radarLegend").innerHTML=`<span>${ic("loc",{size:12,color:"var(--green)"})}${S.city}</span><span><span class="grade g-A sm" style="width:16px;height:16px;font-size:10px">A</span>${L("great fit","skvěle sedí")}</span><span><span class="grade g-D sm" style="width:16px;height:16px;font-size:10px">D</span>${L("weak fit","slabě sedí")}</span><span>${ic("star",{size:12,color:"var(--fat)"})}${L("Premium spot","Prémiové místo")}</span>`;
 $$("#radarSvg .rdot").forEach(d=>d.onclick=()=>openPlace(d.dataset.place));
 // insight
 const top=ranked[0];
 $("#radarInsight").innerHTML=`<div class="insight"><span class="ib">${ic("bulb",{size:20})}</span><div class="it"><b>${L("Best move near you","Nejlepší tah poblíž")}</b><p>${L((LANG==="cs"?top.pl.cs:top.pl.en)+" is "+top.pl.dist+"m away and its "+(LANG==="cs"?top.best.it.cs:top.best.it.en)+" grades "+grade(top.best.pct)+" for what you have left today.",(LANG==="cs"?top.pl.cs:top.pl.en)+" je "+top.pl.dist+"m daleko a "+(LANG==="cs"?top.best.it.cs:top.best.it.en)+" má známku "+grade(top.best.pct)+" pro dnešek.")}</p></div></div>`;
 $("#placeList").innerHTML=ranked.map(r=>placeRow(r.pl,r.best)).join("");
 $$("#placeList .place").forEach(p=>p.onclick=()=>openPlace(p.dataset.place));
 $("#radarFilterBtn").onclick=openRadarFilter;
}
function openRadarFilter(){const opts=[["all",L("All places","Vše")],["fit",L("Great fit only (A/B)","Jen skvěle sedící")],["delivery",L("Delivery available","S doručením")],["grocery",L("Grocery only","Jen obchody")]];
 openSheet("amt",`<div class="amtwrap"><h3>${L("Filter radar","Filtrovat radar")}</h3><div class="optcol" style="margin-top:12px">${opts.map(o=>`<div class="opt ${radarFilter===o[0]?'sel':''}" data-rf="${o[0]}">${o[1]}</div>`).join("")}</div></div>`);
 $$("#amtBody [data-rf]").forEach(o=>o.onclick=()=>{radarFilter=o.dataset.rf;closeSheets();renderRadar();});}
function openPlace(id){const pl=PLACES.find(p=>p.id===id);const rem=remaining();const locked=pl.premium&&!S.premium;
 let items=pl.items.map(it=>({it,pct:itemFit(it)})).sort((a,b)=>b.pct-a.pct);
 let body=`<div class="amtwrap" style="text-align:left"><div style="display:flex;align-items:center;gap:12px;margin-bottom:6px"><span class="ptile" style="width:48px;height:48px;background:var(--mint);color:var(--navy)">${ic(PLACE_ICON[pl.type]||"store",{size:24})}</span>
   <div><h3 style="margin:0">${LANG==="cs"?pl.cs:pl.en}</h3><div class="muted" style="font-size:12px;font-weight:600">${ic("pin",{size:11})} ${pl.dist}m · ${partnerBadge(pl.partner)||L("In-store","Na místě")}</div></div></div>`;
 if(locked)body+=`<div class="locked" style="margin:12px 0"><div class="lk">${ic("star",{size:22,fill:true})}</div><h4>${L("Premium partner","Prémiový partner")}</h4><p>${L("Unlock ranked menu picks and partner deals at premium spots.","Odemkni řazené položky a nabídky u prémiových míst.")}</p><button class="btn btn-primary" onclick="closeSheets();go('profile')">${L("Start Premium","Aktivovat Premium")}</button></div>`;
 else{body+=items.map(x=>{const it=x.it;const fillP=Math.min(it.p,Math.max(0,rem.p));const toTarget=Math.min(100,Math.round((rem.tot.p+it.p)/S.targets.protein*100));
   return `<div class="altcard"><div class="ahead">${gradeBadge(x.pct)}<div style="flex:1"><div style="font-weight:800;font-size:14px">${LANG==="cs"?it.cs:it.en}</div><div class="muted" style="font-size:12px;font-weight:600">${it.kcal} kcal · P${it.p} C${it.c} F${it.f} · ${price(it.price)}</div></div><div style="font-weight:800;color:var(--green)">${x.pct}%</div></div>
     <div class="why">${ic("dumbbell",{size:12,color:MC.P})} ${L("Adds ~"+Math.round(fillP)+"g protein → "+toTarget+"% to target","Přidá ~"+Math.round(fillP)+"g bílkovin → "+toTarget+"% k cíli")}. ${it.f>Math.max(0,rem.f)+4?L("Fat runs a little high for today.","Tuku je na dnešek trochu víc."):L("Fits your remaining fat.","Sedne na zbývající tuk.")}</div>
     <div style="display:flex;gap:8px;margin-top:8px">${pl.partner?`<button class="btn btn-primary btn-sm" style="flex:1" data-order="${pl.partner}">${ic("bike",{size:14})}${pl.partner==="wolt"?"Wolt":"foodora"}</button>`:''}<button class="btn btn-ghost btn-sm" style="flex:1" data-logit='${encodeURIComponent(JSON.stringify(it))}'>${ic("plus",{size:14})}${L("Log it","Zapsat")}</button></div></div>`;}).join("");}
 body+=`</div>`;
 openSheet("amt",body);
 $$("#amtBody [data-order]").forEach(b=>b.onclick=()=>toast(L("Opening "+(b.dataset.order==="wolt"?"Wolt":"foodora")+"… (demo)","Otevírám… (demo)"),"bike"));
 $$("#amtBody [data-logit]").forEach(b=>b.onclick=()=>{const it=JSON.parse(decodeURIComponent(b.dataset.logit));todayLog().push({id:"ext_"+Date.now(),name_en:it.en,name_cs:it.cs,cat:"fork",amount:1,meal:guessMeal(),kcal:it.kcal,p:it.p,c:it.c,f:it.f});save();closeSheets();renderHome();toast(L("Added","Přidáno"),"check");});
}

let craveSel=null;
function renderCrave(){
 $("#craveHeader").innerHTML=`<div class="insight" style="margin-bottom:16px"><span class="ib">${ic("crave",{size:20})}</span><div class="it"><b>${L("Craving something you 'can't' have?","Chuť na něco, co ‚nesmíš‘?")}</b><p>${L("Tell us what you want. We'll map it to swaps that solve the craving and still fit your macros today — no shame, just a better route.","Řekni, na co máš chuť. Namapujeme to na varianty, které chuť zaženou a sednou do makUr.")}</p></div></div>
   <div class="sec-title" style="margin-top:6px"><h3>${L("What are you craving?","Na co máš chuť?")}</h3></div>`;
 $("#craveBody").innerHTML=`<div class="cravegrid" id="craveGrid">${CRAVINGS.map(c=>`<div class="craveopt" data-crave="${c.id}"><span class="cvic" style="background:color-mix(in srgb,${c.col} 15%,transparent);color:${c.col}">${ic(c.ic,{size:24})}</span><b>${LANG==="cs"?c.cs:c.en}</b></div>`).join("")}</div><div id="craveResult"></div>`;
 $$("#craveGrid .craveopt").forEach(o=>o.onclick=()=>{craveSel=o.dataset.crave;renderCraveResult();});
 if(craveSel)renderCraveResult();
}
function altMacros(a){let m=servingMacros(FMAP[a.ref],a.g);if(a.add){const m2=servingMacros(FMAP[a.add.ref],a.add.g);m={kcal:m.kcal+m2.kcal,p:m.p+m2.p,c:m.c+m2.c,f:m.f+m2.f};}return m;}
function altName(a){let n=fname(FMAP[a.ref]);if(a.add)n+=" + "+fname(FMAP[a.add.ref]);return n;}
function renderCraveResult(){
 const c=CRAVINGS.find(x=>x.id===craveSel);const rem=remaining();

function isOnTarget(e){const tot=totalsFor(e);return tot.kcal>0&&tot.kcal<=S.targets.calories*1.05&&tot.p>=S.targets.protein*0.8;}
function computeStreak(){let s=0;const d=Date.now();for(let i=0;i<60;i++){const k=new Date(d-i*864e5).toISOString().slice(0,10);const log=S.logs[k];if(i===0&&(!log||!log.length))continue;if(log&&log.length&&isOnTarget(log))s++;else if(i>0)break;}return s;}
function dayGrade(tot){if(!tot.kcal)return null;const pct=matchPctDay(tot);return grade(pct);}
function matchPctDay(tot){/* how balanced the day is vs targets */const g=S.targets;
 const s=(1-Math.min(1,Math.abs(tot.kcal-g.calories)/g.calories))*0.4+(Math.min(1,tot.p/g.protein))*0.35+(1-Math.min(1,Math.abs(tot.c-g.carbs)/g.carbs))*0.15+(1-Math.min(1,Math.abs(tot.f-g.fat)/g.fat))*0.1;
 return Math.round(s*100);}
function renderHistory(){
 const st=computeStreak();
 const last7=[...Array(7)].map((_,i)=>{const k=new Date(Date.now()-i*864e5).toISOString().slice(0,10);return S.logs[k]&&isOnTarget(S.logs[k]);}).filter(Boolean).length;
 let html=`<div class="card" style="margin-bottom:14px;display:flex;align-items:center;gap:14px">
   <span style="width:52px;height:52px;border-radius:16px;background:color-mix(in srgb,var(--cal) 15%,transparent);color:var(--cal);display:flex;align-items:center;justify-content:center">${ic("flame",{size:26})}</span>
   <div style="flex:1"><div style="font-size:30px;font-weight:800;line-height:1">${st} ${L("day"+(st===1?"":"s"),"dní")}</div><div class="muted" style="font-size:12px;font-weight:600">${L("macro streak","série makro dní")} · ${last7}/7 ${L("on target","na cíli")}</div></div></div>`;
 // days
 const days=[...Array(30)].map((_,i)=>{const d=new Date(Date.now()-i*864e5),k=d.toISOString().slice(0,10);const log=S.logs[k]||[];return{d,k,log,tot:totalsFor(log)};});
 const shown=S.premium?days:days.slice(0,14);
 html+=`<div class="sec-title"><h3>${ic("history",{size:16})}${S.premium?L("Full history","Celá historie"):L("Last 14 days","Posledních 14 dní")}</h3></div>`;
 shown.forEach((x,idx)=>{const has=x.log.length;const g=has?dayGrade(x.tot):null;const open=S._histOpen===x.k;
   const dl=x.d.toLocaleDateString(LANG==="cs"?"cs-CZ":"en-GB",{weekday:"short",day:"numeric",month:"short"});
   html+=`<div class="widget ${open?'open':''}" data-day="${x.k}">
     <div class="widget-head dayhead" data-day="${x.k}">
       <span class="whic" style="background:${has?'color-mix(in srgb,var(--green) 14%,transparent)':'var(--border)'}">${has?gradeBadge(matchPctDay(x.tot),true):ic("minus",{size:16})}</span>
       <div class="wtitle"><b>${dl}</b><span>${has?Math.round(x.tot.kcal)+" kcal · P"+Math.round(x.tot.p)+" C"+Math.round(x.tot.c)+" F"+Math.round(x.tot.f):L("No log","Bez záznamu")}</span></div>
       ${has?'<span class="chev">'+ic("chevD",{size:18})+'</span>':''}</div>
     ${has?`<div class="widget-body">${x.log.map(e=>`<div class="row">${foodTileFromLog(e)}<div class="info"><div class="nm">${LANG==="cs"?(e.name_cs||e.name_en):e.name_en} · ${e.amount}g</div><div class="mm">P${Math.round(e.p)} C${Math.round(e.c)} F${Math.round(e.f)} · ${mealName(e.meal)}</div></div><div class="kc">${Math.round(e.kcal)}</div></div>`).join("")}</div>`:''}
   </div>`;});
 if(!S.premium)html+=`<div class="locked" style="margin-top:6px"><div class="lk">${ic("lock",{size:22})}</div><h4>${L("See your long-term trend","Zobraz dlouhodobý trend")}</h4><p>${L("Full history, weight trend and advanced stats are a Premium feature.","Celá historie, trend váhy a pokročilé statistiky jsou v Premium.")}</p><button class="btn btn-primary" id="histProm">${ic("sparkle",{size:15})}${L("Unlock unlimited history","Odemknout historii")}</button></div>`;
 $("#historyContent").innerHTML=html;
 $$("#historyContent .dayhead").forEach(h=>h.onclick=()=>{const k=h.dataset.day;if(!S.logs[k]||!S.logs[k].length)return;S._histOpen=S._histOpen===k?null:k;renderHistory();});

}

const GP={lose:{c:1800,p:150,carb:150,f:60},maintain:{c:2200,p:150,carb:220,f:70},gain:{c:2600,p:180,carb:280,f:80}};
const OB_STEPS=7;
function renderOb(){const b=$("#obBody"),T=(en,cs)=>obData.lang==="cs"?cs:en;let h="";
 if(obStep===0){h=`<div class="center" style="margin-bottom:6px">${pinLogo(64)}</div><div class="center"><h2 style="font-size:28px;margin-bottom:2px">Food GPS</h2><p class="muted" style="font-weight:600">${T("Know what to eat next","Víš, co si dát dál")}</p></div>
   <div class="step">${T("Step 1 of 7","Krok 1 ze 7")}</div><h2>${T("What is your goal?","Jaký je tvůj cíl?")}</h2>
   <div class="optcol">${[["lose","f_grain",T("Lose weight","Zhubnout")],["maintain","target",T("Maintain","Udržet")],["gain","dumbbell",T("Gain muscle","Nabrat svaly")]].map(o=>`<div class="opt ${obData.goal===o[0]?'sel':''}" data-goal="${o[0]}"><span class="oic">${ic(o[1],{size:22})}</span>${o[2]}</div>`).join("")}</div>`;}
 else if(obStep===1){h=`<div class="step">${T("Step 2 of 7","Krok 2 ze 7")}</div><h2>${T("Set your daily calories","Nastav denní kalorie")}</h2><div class="field"><label>${T("Daily calories","Denní kalorie")}</label><input type="number" id="obCal" value="${obData.calories}"></div><p class="muted center" style="font-size:12px">${T("Suggested","Doporučeno")}: ${GP[obData.goal].c} kcal</p>`;}
 else if(obStep===2){h=`<div class="step">${T("Step 3 of 7","Krok 3 ze 7")}</div><h2>${T("Set your macros","Nastav makra")}</h2><div class="field"><label>${ic("dumbbell",{size:12,color:MC.P})} ${T("Protein","Bílkoviny")} (g)</label><input type="number" id="obP" value="${obData.protein}"></div><div class="field"><label>${ic("f_grain",{size:12,color:MC.C})} ${T("Carbs","Sacharidy")} (g)</label><input type="number" id="obC" value="${obData.carbs}"></div><div class="field"><label>${ic("f_oil",{size:12,color:MC.F})} ${T("Fat","Tuky")} (g)</label><input type="number" id="obF" value="${obData.fat}"></div>`;}
 else if(obStep===3){h=`<div class="step">${T("Step 4 of 7","Krok 4 ze 7")}</div><h2>${T("When should tips appear?","Kdy zobrazit tipy?")}</h2><div class="optcol">${[[40,"40%"],[50,"50%"],[60,"60%"],[70,"70%"],[0,T("Always","Vždy")]].map(o=>`<div class="opt ${obData.thresh===o[0]?'sel':''}" data-thresh="${o[0]}">${o[1]}${o[0]!==0?" "+T("of calories","kalorií"):""}</div>`).join("")}</div>`;}
 else if(obStep===4){h=`<div class="step">${T("Step 5 of 7","Krok 5 ze 7")}</div><h2>${T("What matters to you?","Co je pro tebe důležité?")}</h2><p class="muted" style="font-weight:600;margin-top:-10px;font-size:13px">${T("Pick any — we tailor recommendations, Radar and swaps to these.","Vyber cokoli — přizpůsobíme doporučení, Radar i náhrady.")}</p>
   <div class="chipwrap">${INTERESTS.map(i=>`<button class="chip ${obData.interests.includes(i[0])?'sel':''}" data-int="${i[0]}">${ic(i[2],{size:14})}${i[1]}</button>`).join("")}</div>
   <div class="field" style="margin-top:16px"><label>${ic("loc",{size:12})} ${T("Your city (for nearby Radar)","Tvé město (pro Radar)")}</label><select id="obCity">${CITIES.map(c=>`<option ${c===obData.city?'selected':''}>${c}</option>`).join("")}</select></div>`;}
 else if(obStep===5){h=`<div class="step">${T("Step 6 of 7","Krok 6 ze 7")}</div><h2>${T("Choose language","Vyber jazyk")}</h2><div class="optcol"><div class="opt ${obData.lang==='en'?'sel':''}" data-lang="en"><span class="oic">${ic("globe",{size:22})}</span>English</div><div class="opt ${obData.lang==='cs'?'sel':''}" data-lang="cs"><span class="oic">${ic("globe",{size:22})}</span>Čeština</div></div>`;}
 else{h=`<div class="center" style="margin:6px 0">${pinLogo(72)}</div><h2 class="center">${T("You're ready.","Můžeš vyrazit.")}</h2><p class="muted center" style="font-weight:600">${T("You are here. These macros remain. Let's find your next food.","Jsi tady. Tohle ti zbývá. Najdeme další jídlo.")}</p>
   <div class="card" style="margin-top:16px"><div class="settingrow" style="border:none"><div class="lab">${ic("flame",{size:15,color:"var(--cal)"})} ${obData.calories} kcal</div><div class="muted">${T("target","cíl")}</div></div>
   <div style="display:flex;justify-content:space-around;margin-top:4px">${[["P",obData.protein,MC.P],["C",obData.carbs,MC.C],["F",obData.fat,MC.F]].map(m=>`<div class="center"><div style="font-weight:800;color:${m[2]}">${m[1]}g</div><div class="muted" style="font-size:11px">${m[0]}</div></div>`).join("")}</div></div>`;}
 b.innerHTML=h;
 $("#obDots").innerHTML=[...Array(OB_STEPS)].map((_,i)=>`<i class="${i===obStep?'on':''}"></i>`).join("");
 $("#obNext").textContent=obStep===OB_STEPS-1?T("Start tracking","Začít"):T("Continue","Pokračovat");
 $("#obBack").style.display=obStep===0?"none":"block";$("#obBack").textContent=T("Back","Zpět");
 $$("[data-goal]").forEach(o=>o.onclick=()=>{obData.goal=o.dataset.goal;const g=GP[obData.goal];obData.calories=g.c;obData.protein=g.p;obData.carbs=g.carb;obData.fat=g.f;renderOb();});
 $$("[data-thresh]").forEach(o=>o.onclick=()=>{obData.thresh=+o.dataset.thresh;renderOb();});
 $$("[data-lang]").forEach(o=>o.onclick=()=>{obData.lang=o.dataset.lang;renderOb();});
 $$("#obBody [data-int]").forEach(o=>o.onclick=()=>{const k=o.dataset.int;if(obData.interests.includes(k))obData.interests=obData.interests.filter(x=>x!==k);else obData.interests.push(k);renderOb();});
 const cy=$("#obCity");if(cy)cy.onchange=e=>obData.city=e.target.value;
}
function obNext(){
 if(obStep===1)obData.calories=+$("#obCal").value||obData.calories;
 if(obStep===2){obData.protein=+$("#obP").value||0;obData.carbs=+$("#obC").value||0;obData.fat=+$("#obF").value||0;}
 if(obStep<OB_STEPS-1){obStep++;renderOb();}
 else{S.onboarded=true;S.goal=obData.goal;S.lang=obData.lang;S.recThreshold=obData.thresh;S.interests=obData.interests;S.city=obData.city;S.targets={calories:obData.calories,protein:obData.protein,carbs:obData.carbs,fat:obData.fat};save();applyLang();seedDemo();$("#scr-onboard").classList.remove("active");go("home");}
}

/* =========================================================================
   Seed demo history
   ========================================================================= */
function seedDemo(){if(S._seeded)return;S._seeded=true;const samples=[["chicken",150],["rice",150],["banana",120],["skyr",150],["oats",50],["almonds",25]];
 for(let i=1;i<=6;i++){const k=new Date(Date.now()-i*864e5).toISOString().slice(0,10);if(S.logs[k])continue;const day=[];samples.forEach((s,idx)=>{if((i+idx)%2===0||idx<3){const f=FMAP[s[0]],m=servingMacros(f,s[1]);day.push({id:f.id,name_en:f.en,name_cs:f.cs,cat:f.cat,amount:s[1],meal:["breakfast","lunch","dinner","snack"][idx%4],kcal:m.kcal,p:m.p,c:m.c,f:m.f});}});S.logs[k]=day;}save();}

/* =========================================================================
   Wire global + boot
   ========================================================================= */
$("#obNext").onclick=obNext;
$("#obBack").onclick=()=>{if(obStep>0){obStep--;renderOb();}};
$("#addFoodBtn").onclick=openFood;
$("#langBtn").onclick=()=>{S.lang=S.lang==="en"?"cs":"en";save();applyLang();};
$("#themeBtn").onclick=()=>{S.dark=!S.dark;save();applyTheme();if(curScreen)go(curScreen);};
$("#foodOverlay").onclick=e=>{if(e.target.id==="foodOverlay")closeSheets();};
$("#amtOverlay").onclick=e=>{if(e.target.id==="amtOverlay")closeSheets();};
$("#foodSearch").oninput=renderFoodList;

applyTheme();LANG=S.lang;applyLang();
if(S.onboarded){seedDemo();$("#scr-onboard").classList.remove("active");go("home");}
else{obData.lang=S.lang;renderOb();}
</script>
</body>
</html>
